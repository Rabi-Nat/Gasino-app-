name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install



      - name: Build web app
        run: npm run build

      - name: Generate Icons
        run: npm run icons:generate

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.14.3
          cache-disabled: false
          wrapper-validation-enabled: false

      - name: Build Release APK
        run: |
          cd android
          gradle assembleRelease -PMYAPP_RELEASE_STORE_FILE=my-release-key.keystore -PMYAPP_RELEASE_KEY_ALIAS=my-key-alias -PMYAPP_RELEASE_STORE_PASSWORD=gasino1234 -PMYAPP_RELEASE_KEY_PASSWORD=gasino1234

      - name: Build Release Bundle (AAB)
        run: |
          cd android
          gradle bundleRelease -PMYAPP_RELEASE_STORE_FILE=my-release-key.keystore -PMYAPP_RELEASE_KEY_ALIAS=my-key-alias -PMYAPP_RELEASE_STORE_PASSWORD=gasino1234 -PMYAPP_RELEASE_KEY_PASSWORD=gasino1234

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/*.apk

      - name: Upload Bundle
        uses: actions/upload-artifact@v4
        with:
          name: app-release-bundle
          path: android/app/build/outputs/bundle/release/*.aab
